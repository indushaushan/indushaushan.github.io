<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator | My Project</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .calculator {
            background-color: #2c3e50;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.2);
            width: 300px;
        }
        .display {
            width: 100%;
            height: 60px;
            background-color: #ecf0f1;
            border: none;
            border-radius: 5px;
            text-align: right;
            font-size: 2rem;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 5px;
            background-color: #34495e;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #3b5998;
        }
        .operator {
            background-color: #e67e22;
        }
        .operator:hover {
            background-color: #d35400;
        }
        .clear {
            background-color: #e74c3c;
            grid-column: span 2;
        }
        .clear:hover {
            background-color: #c0392b;
        }
        .equal {
            background-color: #27ae60;
            grid-column: span 2;
        }
        .equal:hover {
            background-color: #2ecc71;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" class="display" id="display" disabled>
        
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendValue('/')">/</button>
            <button class="operator" onclick="appendValue('*')">x</button>
            
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('-')">-</button>
            
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('+')">+</button>
            
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="equal" onclick="calculate()">=</button>
            
            <button onclick="appendValue('0')" style="grid-column: span 2;">0</button>
            <button onclick="appendValue('.')">.</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        // Number saha operator display ekata danna
        function appendValue(value) {
            display.value += value;
        }

        // Display eka clear karanna
        function clearDisplay() {
            display.value = '';
        }

        // Math eka calculate karanna
        function calculate() {
            try {
                // eval() kiyanne JS wala built-in math function ekak
                display.value = eval(display.value); 
            } catch (error) {
                display.value = 'Error';
            }
        }
    </script>
</body>
</html>
